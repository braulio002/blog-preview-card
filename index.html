<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog Preview Card</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@500;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <article class="card">
    <img src="assets/images/illustration-article.svg" alt="Thumbnail for blog post">
    
    <div class="meta">
      <span class="category">Learning</span>
      <time datetime="2026-02-27">Published 27 Feb 2026</time>
    </div>

    <h1>HTML & CSS foundations</h1>
    <p>
      These languages are the backbone of every website, defining structure,
      content, and presentation.
    </p>

    <div class="author">
      <img src="assets/images/image-avatar.webp" alt="Greg Hooper">
      <span>Greg Hooper</span>
    </div>
  </article>
</body>
</html>
